<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nuevo anuncio</title>
  <style>
    :root{--bg:#0b1020;--panel:#121933;--text:#f8fafc;--muted:#94a3b8;--accent:#22c55e;--border:#24304f;--input:#0f172a}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,sans-serif;background:linear-gradient(180deg,#0b1020,#111827);color:var(--text)}
    .wrap{max-width:560px;margin:0 auto;padding:20px 16px 40px}.card{background:var(--panel);border:1px solid var(--border);border-radius:22px;padding:18px 16px;margin-top:14px}
    h1{font-size:1.8rem;line-height:1.05;margin:0 0 10px} p{color:var(--muted);line-height:1.6;margin:0 0 14px}
    .grid{display:grid;gap:12px}.field label{display:block;font-size:.92rem;margin-bottom:6px;color:#cbd5e1}.field input,.field textarea,.field select{width:100%;padding:13px 14px;border-radius:14px;border:1px solid #2a3b5f;background:var(--input);color:var(--text);font:inherit}.field textarea{min-height:110px;resize:vertical}
    .upload{border:1px dashed #3b4f78;border-radius:18px;padding:18px;text-align:center;color:var(--muted);background:#0f172a}.actions{display:flex;gap:10px;margin-top:14px}.btn{flex:1;border:none;border-radius:16px;padding:14px 16px;font-weight:800;font-size:1rem}.btn.primary{background:var(--accent);color:#052e16}.btn.secondary{background:#1e293b;color:#e2e8f0}.hint{font-size:.88rem;color:var(--muted);margin-top:8px}.notice{margin-top:12px;padding:12px 14px;border-radius:14px;font-size:.92rem}.notice.error{background:#3a1720;color:#fecdd3}.notice.warning{background:#3a2d11;color:#fde68a}.notice ul{margin:8px 0 0 18px;padding:0}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Nuevo anuncio</h1>
      <p>Sube las fotos y completa solo lo mínimo. La app se encargará del resto del borrador.</p>
      <div class="upload">Añadir fotos del producto<br><span class="hint">Frontal, etiqueta, talla y defectos visibles si los hay</span><div style="margin-top:12px"><input name="image" type="file" accept="image/*"></div><div class="hint" data-upload-info></div></div>
    </section>

    <section class="card">
      <form id="new-draft-form" class="grid" data-new-draft-form>
        <div class="field"><label>Título</label><input name="title" placeholder="Ej. Chaqueta vaquera Zara"></div>
        <div class="field"><label>Descripción</label><textarea name="description" placeholder="Describe el artículo brevemente"></textarea></div>
        <div class="field"><label>Categoría</label><select name="category"><option>Ropa</option><option>Libros</option><option>Hogar</option><option>Electrónica</option></select></div>
        <div class="field"><label>Marca</label><input name="brand" placeholder="Ej. Zara"></div>
        <div class="field"><label>Estado</label><select name="condition"><option value="very_good">Muy bueno</option><option value="good">Bueno</option><option value="satisfactory">Satisfactorio</option></select></div>
        <div class="field"><label>Precio</label><input name="price" type="number" placeholder="20"></div>
      </form>
      <div class="actions">
        <a class="btn secondary" href="./index.html" style="text-decoration:none;text-align:center;display:block;">Guardar borrador</a>
        <button class="btn primary" type="submit" form="new-draft-form">Generar borrador asistido</button>
      </div>
          <div data-form-errors></div>
      <div data-form-warnings></div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
