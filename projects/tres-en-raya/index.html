<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Tres en raya</title><style>body{font-family:system-ui,sans-serif;background:#0f172a;color:#f8fafc;display:grid;place-items:center;min-height:100vh;margin:0}.app{max-width:420px;text-align:center}.board{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:18px}button.cell{height:96px;font-size:2rem;border:none;border-radius:16px;background:#1e293b;color:#fff;cursor:pointer}.row{display:flex;gap:10px;justify-content:center;margin-top:16px}button.ui,a{padding:10px 14px;border-radius:12px;border:none;text-decoration:none}button.ui{cursor:pointer;background:#7c3aed;color:#fff}a{background:#334155;color:#fff}</style></head><body><div class="app"><h1>Tres en raya</h1><p id="status">Turno de X</p><div class="board" id="board"></div><div class="row"><button class="ui" id="reset">Reiniciar</button><a href="../../">Volver</a></div></div><script>const board=document.getElementById('board');const statusEl=document.getElementById('status');const reset=document.getElementById('reset');let cells=Array(9).fill('');let current='X';let gameOver=false;const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];function render(){board.innerHTML='';cells.forEach((v,i)=>{const b=document.createElement('button');b.className='cell';b.textContent=v;b.onclick=()=>play(i);board.appendChild(b);});}function play(i){if(cells[i]||gameOver)return;cells[i]=current;const win=wins.find(w=>w.every(n=>cells[n]===current));if(win){statusEl.textContent=`Gana ${current}`;gameOver=true;render();return;}if(cells.every(Boolean)){statusEl.textContent='Empate';gameOver=true;render();return;}current=current==='X'?'O':'X';statusEl.textContent=`Turno de ${current}`;render();}reset.onclick=()=>{cells=Array(9).fill('');current='X';gameOver=false;statusEl.textContent='Turno de X';render();};render();</script></body></html>
